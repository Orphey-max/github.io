            } else if(typeof m.content==='string'){
              appendDebug(`  string length:${m.content.length} preview:${m.content.slice(0,120)}`);
            }
          } else {
            appendDebug('原始响应(前300): '+rawText.slice(0,300));
          }
          let imgUrl = parseImageFromResponse(js, appendDebug);
          if(!imgUrl){
            appendDebug('未能解析到图像，使用占位图');
            const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
              <rect fill="#f0f4f8" width="400" height="400"/>
              <text x="50%" y="38%" text-anchor="middle" fill="#6b7280" font-size="14" font-family="sans-serif">未能解析到图像</text>
              <text x="50%" y="52%" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">请点击「调试」查看响应详情</text>
              <text x="50%" y="64%" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">${gd.width}×${gd.height}</text>
            </svg>`;
            imgUrl='data:image/svg+xml;base64,'+safeB64(svg);
            toast('⚠️ 图像解析失败，请点击「调试」查看响应','error');
          } else {
            appendDebug('✓ 图像解析成功 url长度:'+imgUrl.length);
          }
          allImgs.push(imgUrl);
        }

        upP(p=>({...p,nodes:p.nodes.map(n=>n.id===gen.id?{...n,status:'success',data:{...n.data,lastImages:allImgs,lastPrompt:pos}}:n)}));

        // ── Route to connected output nodes
        const outConns=conns.filter(c=>c.from===gen.id);
        const tgtIds=outConns.map(c=>c.to).filter(id=>nodes.find(n=>n.id===id&&n.type==='output'));
        const targets=tgtIds.length>0?tgtIds:[outs[0]?.id].filter(Boolean);
        for(const oid of targets){
          upP(p=>({
            ...p,
            nodes:p.nodes.map(n=>n.id===oid?{...n,status:'success',data:{...n.data,images:allImgs}}:n),
            images:[...(p.images||[]),...allImgs.map(u=>({id:Date.now()+'_'+Math.random(),url:u,ts:Date.now(),
              prompt:pos,neg,width:gd.width,height:gd.height,model:gd.model||MODEL,mode:gd.mode||'standard',seed:gd.seed||(-1)
            }))]
          }));
        }
      }
      toast('🎨 工作流执行完成！','success');
    } catch(err){
      toast('❌ '+err.message,'error');
      upP(p=>({...p,nodes:p.nodes.map(n=>n.status==='running'?{...n,status:'error'}:n)}));
    }
    setRunning(false);
  };

  // ── Run only selected nodes
  const runSelected = async(nodeIds)=>{
    if(!ap||nodeIds.size===0)return;
    if(!getApiKey()){setShowApiCfg(true);return;}
    setRunning(true);
    toast(`▶ 运行选中的 ${nodeIds.size} 个节点...`,'info');

    // Build a virtual project with only selected nodes + their connections
    const selNodes = ap.nodes.filter(n=>nodeIds.has(n.id));
    const selConns = ap.connections.filter(c=>nodeIds.has(c.from)&&nodeIds.has(c.to));

    // Reset status for selected nodes
    upP(p=>({...p,nodes:p.nodes.map(n=>nodeIds.has(n.id)?{...n,status:''}:n)}));

    try {
      const gens = selNodes.filter(n=>n.type==='generate');
      const outs = selNodes.filter(n=>n.type==='output');
      // Fall back to any output node on canvas if none selected
      const allOuts = outs.length?outs:ap.nodes.filter(n=>n.type==='output');

      if(!gens.length){
        toast('选中区域内没有生成节点，请框选包含⚡生成节点的区域','error');
        setRunning(false);return;
      }

      for(const gen of gens){
        upP(p=>({...p,nodes:p.nodes.map(n=>n.id===gen.id?{...n,status:'running'}:n)}));
        const ins=selConns.filter(c=>c.to===gen.id);

        let pos='',neg='';
        for(const c of ins){
          const src=ap.nodes.find(n=>n.id===c.from);if(!src)continue;
          if(src.type==='prompt'){pos+=(src.data.positive||'')+' ';neg+=(src.data.negative||'')+' ';}
          else if(src.type==='optprompt'){pos+=((src.data.output||src.data.input)||'')+' ';}
          else if(src.type==='analyze'&&src.data.result?.trim()){pos+=src.data.result.trim()+' ';}
        }
        pos=pos.trim();neg=neg.trim();
        if(!pos){
          // try all connections to this gen node (may connect to nodes outside selection)
          const allIns=ap.connections.filter(c=>c.to===gen.id);
          for(const c of allIns){
            const src=ap.nodes.find(n=>n.id===c.from);if(!src)continue;
            if(src.type==='prompt'){pos+=(src.data.positive||'')+' ';neg+=(src.data.negative||'')+' ';}
            else if(src.type==='optprompt'){pos+=((src.data.output||src.data.input)||'')+' ';}
          }
          pos=pos.trim();neg=neg.trim();
        }
        if(!pos){toast('提示词为空','error');continue;}

        // Collect ALL connected imagein nodes (ordered by image_N port index)
        const allInsForImg=ap.connections.filter(c=>c.to===gen.id);
        const rawRefsForSel = allInsForImg
          .filter(c=>c.toPort?.startsWith('image_')||c.toPort==='image')
          .sort((a,b)=>{
            const ai=parseInt((a.toPort?.split('_')||[])[1])||0;
            const bi=parseInt((b.toPort?.split('_')||[])[1])||0;
            return ai-bi;
          })
          .map(c=>ap.nodes.find(n=>n.id===c.from))
          .filter(src=>src?.type==='imagein'&&src.data.image)
          .slice(0,14);
        const refImages = await Promise.all(rawRefsForSel.map(async src=>({
          url: await compressImage(src.data.image),
          strength: src.data.strength||0.75
        })));
        appendDebug(`[选中] 参考图数量: ${refImages.length}`);

        const gd=gen.data,count=Math.min(gd.count||1,4);
        const allImgs=[];
        for(let i=0;i<count;i++){
          const {body: reqBody, finalPrompt, resTier} = buildImageRequest(pos, neg, gd, refImages);
          appendDebug(`[选中] prompt(前80): ${finalPrompt.slice(0,80)} | 分辨率: ${resTier}`);

          const resp=await fetch(`${API_BASE}/v1/chat/completions`,{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${getApiKey()}`},
            body:JSON.stringify(reqBody)
          });
          if(!resp.ok){const t=await resp.text();throw new Error(`API ${resp.status}: ${t.slice(0,200)}`);}
          const _rawSel = await resp.text();
          let js;
          try{ js=JSON.parse(_rawSel); }catch(e){ throw new Error('响应不是有效JSON: '+_rawSel.slice(0,120)); }
          appendDebug(`[选中运行] 响应 keys:${Object.keys(js).join(',')} choices[0].message.content type:${typeof js.choices?.[0]?.message?.content}`);
          if(js.choices?.[0]){
            const m=js.choices[0].message;
            if(Array.isArray(m.content)) m.content.forEach((p,idx)=>appendDebug(`  [sel]part[${idx}] type:${p.type} keys:${Object.keys(p).join(',')}`));
            else appendDebug(`  [sel]string content preview:${String(m.content||'').slice(0,120)}`);
          } else { appendDebug('[sel]原始:'+_rawSel.slice(0,200)); }
          let imgUrl = parseImageFromResponse(js, appendDebug);
          if(!imgUrl){
            const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="#f0f4f8" width="400" height="400"/><text x="50%" y="44%" text-anchor="middle" fill="#6b7280" font-size="13" font-family="sans-serif">未能解析到图像</text><text x="50%" y="56%" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">请查看调试面板</text></svg>`;
            imgUrl='data:image/svg+xml;base64,'+safeB64(svg);
          }
          allImgs.push(imgUrl);
        }

        upP(p=>({...p,nodes:p.nodes.map(n=>n.id===gen.id?{...n,status:'success',data:{...n.data,lastImages:allImgs,lastPrompt:pos}}:n)}));
        const outConns=ap.connections.filter(c=>c.from===gen.id);
        const tgtIds=outConns.map(c=>c.to).filter(id=>ap.nodes.find(n=>n.id===id&&n.type==='output'));
        const targets=tgtIds.length?tgtIds:[allOuts[0]?.id].filter(Boolean);
        for(const oid of targets){
          upP(p=>({...p,
            nodes:p.nodes.map(n=>n.id===oid?{...n,status:'success',data:{...n.data,images:allImgs}}:n),
            images:[...(p.images||[]),...allImgs.map(u=>({id:Date.now()+'_'+Math.random(),url:u,ts:Date.now(),
              prompt:pos,neg,width:gd.width,height:gd.height,model:gd.model||MODEL,mode:gd.mode||'standard',seed:gd.seed||(-1)
            }))]
          }));
        }
      }
      toast('🎨 选中节点执行完成！','success');
    } catch(err){
      toast('❌ '+err.message,'error');
      upP(p=>({...p,nodes:p.nodes.map(n=>nodeIds.has(n.id)&&n.status==='running'?{...n,status:'error'}:n)}));
    }
    setRunning(false);
  };

  // ── Workflow IO
  const save=()=>{
    if(!ap)return;
    const a=document.createElement('a');
    a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(ap,null,2));
    a.download=`${ap.name}.json`;a.click();
    toast('工作流已保存','success');
  };
  const load=()=>{
    const i=document.createElement('input');i.type='file';i.accept='.json';
    i.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{const w=JSON.parse(ev.target.result);w.id=`p${Date.now()}`;
          setProjects(ps=>[...ps,w]);setPid(w.id);toast('加载成功','success');
        }catch{toast('加载失败','error');}
      };r.readAsText(f);
    };i.click();
  };
  const clear=()=>{upP(p=>({...p,nodes:[],connections:[]}));toast('已清空','info');};
  const mkProj=()=>{
    if(!npName.trim())return;
    const w=mkDefault();w.name=npName.trim();
    setProjects(ps=>[...ps,w]);setPid(w.id);
    setShowNP(false);setNPName('');
    toast(`项目"${w.name}"已创建`,'success');
  };
  const delProj=id=>{
    setProjects(ps=>ps.filter(p=>p.id!==id));
    if(pid===id){const r=projects.filter(p=>p.id!==id);setPid(r[0]?.id||null);}
  };

  // ── Render node
  const rNode = n=>{
    const isSel=selectedIds.has(n.id);
    const w=(ch)=><div key={n.id} data-node-id={n.id} onMouseDown={e=>onNMD(e,n.id)}>{ch}</div>;
    const com={node:{...n,selHighlight:isSel},onUpdate:upN,onDelete:delN,onStartConn:startConn};
    switch(n.type){
      case 'prompt':    return w(<PromptNode    {...com} linkedToImage={promptLinkedToImage(n.id)}/>);
      case 'optprompt': return w(<OptPromptNode {...com}/>);
      case 'imagein':   return w(<ImageInNode   {...com} onEndConn={endConn}/>);
      case 'generate':  return w(<GenerateNode  {...com} connSrcTypes={connSrcTypes(n.id)} connectedImgNodes={connectedImgNodes(n.id)} onEndConn={endConn} onPreview={setLightboxSrc}/>);
      case 'output':    return w(<OutputNode    {...com} onEndConn={endConn} onSendToImageIn={sendToImageIn} onPreview={setLightboxSrc}/>);
      case 'analyze':   return w(<AnalyzeNode   {...com} onEndConn={endConn}/>);
      default: return null;
    }
  };

  const status=running?'running':(ap?.nodes.some(n=>n.status==='success')?'done':'idle');

  // ── Gallery Panel ────────────────────────────────────────────────────────
  const GalleryPanel = ()=>{
    const filteredImgs = allGalleryImages.filter(img=>{
      if(galFilter!=='all'&&img.projId!==galFilter)return false;
      if(galSearch.trim()){
        const q=galSearch.toLowerCase();
        return img.projName?.toLowerCase().includes(q)||
               new Date(img.ts).toLocaleDateString('zh-CN').includes(q);
      }
      return true;
    });
    const fmtTime = ts=>{
      if(!ts)return '';
      const d=new Date(ts);
      return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})+' '+
             d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    };
    return (
      <div className="gallery-panel">
        <div className="gallery-hdr">
          <button className="btn btn-g" style={{padding:'5px 10px'}}
            onClick={()=>setShowGallery(false)}>← 返回画布</button>
          <span className="gallery-title">🖼 图库</span>
          <span className="gallery-count">{filteredImgs.length} 张</span>
          <input className="gallery-search" placeholder="搜索项目名称或日期..."
            value={galSearch} onChange={e=>setGalSearch(e.target.value)}/>
          <div className="gallery-filter">
            <button className={`gf-btn ${galFilter==='all'?'active':''}`}
              onClick={()=>setGalFilter('all')}>全部</button>
            {projects.filter(p=>p.images?.length).map(p=>(
              <button key={p.id} className={`gf-btn ${galFilter===p.id?'active':''}`}
                onClick={()=>setGalFilter(p.id)}>
                {p.name}
              </button>
            ))}
          </div>
          {filteredImgs.length>0&&(
            <button className="btn btn-g" style={{marginLeft:4,fontSize:11}}
              onClick={()=>{
                filteredImgs.forEach((img,i)=>{
                  setTimeout(()=>{
                    const a=document.createElement('a');
                    a.href=img.url;a.download=`gallery_${i+1}_${Date.now()}.png`;a.click();
                  },i*200);
                });
              }}>
              ↓ 全部下载
            </button>
          )}
        </div>
        <div className="gallery-body">
          {filteredImgs.length===0?(
            <div className="gallery-empty">
              <span style={{fontSize:48}}>🖼️</span>
              <span style={{fontSize:15,color:'var(--t2)'}}>图库为空</span>
              <span style={{fontSize:12}}>运行工作流后，生成的图片会自动保存到这里</span>
            </div>
          ):(
            <div className="gallery-grid">
              {filteredImgs.map((img,i)=>(
                <div key={img.id||i} className="gal-item" onClick={()=>setGalInfoImg(img)}>
                  <img className="gal-img" src={img.url} alt=""/>
                  <span className="gal-badge">{img.projName||'未知'}</span>
                  <div className="gal-actions" onClick={e=>e.stopPropagation()}>
                    <button className="gal-act" onClick={()=>setLightboxSrc(img.url)}>🔍 大图</button>
                    <button className="gal-act" onClick={()=>{
                      const a=document.createElement('a');
                      a.href=img.url;a.download=`gen_${Date.now()}.png`;a.click();
                    }}>↓ 下载</button>
                    <button className="gal-act" style={{background:'rgba(14,165,233,.9)',color:'#fff'}}
                      onClick={()=>{sendToImageIn(img.url);setShowGallery(false);}}>
                      ♻️ 送到参考图
                    </button>
                    <button className="gal-act danger"
                      onClick={e=>{e.stopPropagation();deleteImage(img.id);}}>
                      🗑 删除
                    </button>
                  </div>
                  <div className="gal-footer">
                    <div className="gal-proj">📁 {img.projName}</div>
                    <div className="gal-time">{fmtTime(img.ts)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── Gallery Info Modal (prompt + params) ──────────────────────────────────
  const GalInfoModal = ({img, onClose})=>{
    if(!img) return null;
    const fmtTime2 = ts=>{
      if(!ts)return '';
      const d=new Date(ts);
      return d.toLocaleDateString('zh-CN')+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    };
    const doubaoPromptUrl = img.prompt ? makeDoubaoUrl(`请帮我优化以下图像提示词：\n${img.prompt}`) : null;
    return (
      <div className="overlay" onClick={onClose}>
        <div className="gal-info-modal" onClick={e=>e.stopPropagation()}>
          <div className="gal-info-hdr">
            <span style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>🖼 图片详情</span>
            <button className="node-x" style={{width:22,height:22,fontSize:15}} onClick={onClose}>×</button>
          </div>
          <div className="gal-info-body">
            <img className="gal-info-img" src={img.url} alt=""
              onClick={()=>{onClose();setLightboxSrc(img.url);}}
              title="点击查看大图"/>
            {img.prompt && (
              <div className="gal-info-section">
                <div className="gal-info-label">生成提示词</div>
                <div className="gal-info-text">{img.prompt}</div>
                {doubaoPromptUrl && (
                  <div style={{marginTop:6,display:'flex',gap:6,flexWrap:'wrap'}}>
                    <a className="doubao-btn" href={doubaoPromptUrl} target="_blank" rel="noopener noreferrer">
                      🤖 豆包 — 优化此提示词
                    </a>
                    <a className="doubao-btn"
                      href={makeDoubaoUrl(`请根据以下提示词风格，生成10个类似的变体提示词：\n${img.prompt}`)}
                      target="_blank" rel="noopener noreferrer">
                      ✨ 豆包 — 生成变体
                    </a>
                  </div>
                )}
              </div>
            )}
            {img.neg && (
              <div className="gal-info-section">
                <div className="gal-info-label">负向提示词</div>
                <div className="gal-info-text" style={{color:'var(--pink)'}}>{img.neg}</div>
              </div>
            )}
            <div className="gal-info-section">
              <div className="gal-info-label">生成参数</div>
              <div className="gal-info-params">
                {img.width&&<div className="gal-info-param"><div className="gal-info-param-k">分辨率</div>
                  <div className="gal-info-param-v">{img.width}×{img.height}</div></div>}
                {img.model&&<div className="gal-info-param"><div className="gal-info-param-k">模型</div>
                  <div className="gal-info-param-v" style={{fontSize:9,wordBreak:'break-all'}}>{img.model}</div></div>}
                {img.mode&&<div className="gal-info-param"><div className="gal-info-param-k">优化模式</div>
                  <div className="gal-info-param-v">{{standard:'标准',creative:'创意',raw:'原始'}[img.mode]||img.mode}</div></div>}
                {img.seed!==undefined&&<div className="gal-info-param"><div className="gal-info-param-k">种子</div>
                  <div className="gal-info-param-v">{img.seed}</div></div>}
                <div className="gal-info-param"><div className="gal-info-param-k">生成时间</div>
                  <div className="gal-info-param-v" style={{fontSize:9}}>{fmtTime2(img.ts)}</div></div>
                <div className="gal-info-param"><div className="gal-info-param-k">项目</div>
                  <div className="gal-info-param-v" style={{fontSize:9}}>{img.projName}</div></div>
              </div>
            </div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:4}}>
              <button className="btn btn-g" style={{flex:1,justifyContent:'center',fontSize:11}} onClick={()=>{
                const a=document.createElement('a');a.href=img.url;a.download=`gen_${Date.now()}.png`;a.click();
              }}>↓ 下载</button>
              <button className="btn btn-g" style={{flex:1,justifyContent:'center',fontSize:11,color:'var(--cyan)'}}
                onClick={()=>{sendToImageIn(img.url);onClose();setShowGallery(false);}}>
                ♻️ 送参考图
              </button>
              <button className="btn btn-del" style={{flex:1,justifyContent:'center',fontSize:11}}
                onClick={()=>{deleteImage(img.id);onClose();}}>
                🗑 删除
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {showGallery&&<GalleryPanel/>}
      {galInfoImg&&<GalInfoModal img={galInfoImg} onClose={()=>setGalInfoImg(null)}/>}
      <Lightbox src={lightboxSrc} onClose={()=>setLightboxSrc(null)}/>
      {/* Header */}
      <div className="hdr">
        <div className="logo"><div className="logo-box">⚡</div>ComfyFlow</div>
        <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--t2)',fontFamily:'JetBrains Mono'}}>
          <span>/</span><span className="proj-chip">{ap?.name||'未选择'}</span>
        </div>
        <div className="hdr-end">
          <button className="btn btn-g" onClick={()=>setShowNP(true)}>＋ 新项目</button>
          <button className="btn btn-g" onClick={save}>💾 保存</button>
          <button className="btn btn-g" onClick={load}>📂 加载</button>
          <button className="btn btn-del" onClick={clear}>🗑 清空</button>
          <button className="btn btn-g" style={{borderColor:'var(--bdr2)'}} onClick={()=>{setApiKeyInput('');setShowApiCfg(true)}}
            title="配置 API Key">
            🔑 API 设置
          </button>
          <button className="btn btn-g" style={{fontSize:11,borderColor:debugLog.length?'#f97316':'var(--bdr)',
            color:debugLog.length?'#ea580c':'var(--t2)'}}
            onClick={()=>setShowDebug(s=>!s)} title="调试面板">
            🔍 调试{debugLog.length>0&&` (${debugLog.length})`}
          </button>
          <button className="btn btn-g" style={{position:'relative'}}
            onClick={()=>setShowGallery(true)}>
            🖼 图库
            {allGalleryImages.length>0&&(
              <span style={{position:'absolute',top:-4,right:-4,background:'var(--cyan)',
                color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:9,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:'JetBrains Mono',fontWeight:700}}>
                {allGalleryImages.length>99?'99+':allGalleryImages.length}
              </span>
            )}
          </button>
          <button className="btn btn-run" onClick={run} disabled={running}>
            {running?<><div className="spin" style={{borderTopColor:'#000'}}/>运行中...</>:'▶ 运行工作流'}
          </button>
        </div>
      </div>

      <div className="layout">
        {/* Sidebar */}
        <div className="sb">
          <div className="sb-sec">
            <div className="sb-ttl">节点库 — 拖拽到画布</div>
            {[
              {type:'prompt',    label:'提示词节点', desc:'正/负向提示词',  col:'#a855f7', icon:'✏️'},
              {type:'optprompt', label:'优化提示词', desc:'中文→英文AI优化',col:'#22d364', icon:'✨'},
              {type:'imagein',   label:'输入图像',   desc:'图生图参考',     col:'#f97316', icon:'🖼️'},
              {type:'generate',  label:'生成节点',   desc:'AI生成配置',     col:'#00d4ff', icon:'⚡'},
              {type:'output',    label:'输出节点',   desc:'展示结果/可迭代',col:'#f43f8e', icon:'🎨'},
              {type:'analyze',   label:'图像分析',   desc:'AI分析图片内容',  col:'#f59e0b', icon:'🔍'},
            ].map(p=>(
              <div key={p.type} className="pal-item"
                draggable onDragStart={e=>e.dataTransfer.setData('node_type',p.type)}>
                <span className="pal-dot" style={{background:p.col}}/>
                <div><div className="pal-lbl">{p.icon} {p.label}</div><div className="pal-dsc">{p.desc}</div></div>
              </div>
            ))}
          </div>

          <div className="sb-sec" style={{paddingTop:4}}>
            <div className="sb-ttl">节点联动说明</div>
            {[
              {col:'#a855f7',txt:'Prompt/OptPrompt → 生成节点左侧 ◌ prompt口'},
              {col:'#f97316',txt:'ImageIn → 生成节点左侧 ◌ image口（图文联动）'},
              {col:'#00d4ff',txt:'生成节点 → 输出节点左侧 ◌ in口'},
              {col:'#f43f8e',txt:'输出节点右侧 → ImageIn（♻️ 迭代循环）'},
            ].map((r,i)=>(
              <div key={i} className="hint-box" style={{borderColor:`${r.col}33`}}>
                <span style={{color:r.col}}>●</span> {r.txt}
              </div>
            ))}
            <div className="hint-box" style={{borderColor:'var(--bdr)',marginTop:4}}>
              🖱 <b>空白处拖拽</b> 平移画布<br/>
              🖱 <b>滚轮</b> 缩放 · <b>⊙</b> 复位视图
            </div>
          </div>

          <div className="proj-area">
            <div className="sb-ttl">项目</div>
            {projects.map(p=>(
              <div key={p.id} className={`proj-it ${p.id===pid?'active':''}`} onClick={()=>setPid(p.id)}>
                <div>
                  <div className="proj-nm">📁 {p.name}</div>
                  <div className="proj-mt">{p.nodes?.length||0}节点·{p.images?.length||0}张图</div>
                </div>
                <button className="proj-x" onClick={e=>{e.stopPropagation();delProj(p.id);}}>×</button>
              </div>
            ))}
            {/* Recent images mini strip */}
            {ap?.images?.length>0&&(
              <div style={{marginTop:8}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'0 4px 6px'}}>
                  <span className="sb-ttl" style={{padding:0,margin:0}}>最近生成</span>
                  <button style={{fontSize:9,color:'var(--cyan)',background:'none',border:'none',
                    cursor:'pointer',fontFamily:'JetBrains Mono',fontWeight:600}}
                    onClick={()=>setShowGallery(true)}>
                    查看全部 →
                  </button>
                </div>
                <div className="hist-grid">
                  {ap.images.slice(-6).reverse().map((img,i)=>(
                    <div key={img.id||i} className="hist-th" title="点击送到参考图"
                      onClick={()=>sendToImageIn(img.url||img)}>
                      <img src={img.url||img} alt=""/>
                      <div className="hist-ovl">♻️</div>
                    </div>
                  ))}
                </div>
                <button className="btn btn-g" style={{width:'100%',justifyContent:'center',
                  fontSize:10,padding:'4px',marginTop:6}}
                  onClick={()=>setShowGallery(true)}>
                  🖼 打开图库（共 {allGalleryImages.length} 张）
                </button>
              </div>
            )}
          </div>
        </div>

        {/* Canvas */}
        <div className="cvs" ref={cvs}
          onDrop={onDrop} onDragOver={e=>e.preventDefault()}
          onMouseDown={onCMD} onWheel={onWheel}
          style={{cursor:panOn?'grabbing':'grab'}}>
          <div className="cvs-inner" style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`}}>
            {ap&&<>
              <ConnSVG conns={ap.connections} nodes={ap.nodes} drag={drag} onDeleteConn={deleteConn} onReRouteStart={reRouteStart}/>
              {ap.nodes.map(rNode)}
              {/* Marquee rectangle */}
              {marquee&&(()=>{
                const mx=Math.min(marquee.sx,marquee.ex),my=Math.min(marquee.sy,marquee.ey);
                const mw=Math.abs(marquee.ex-marquee.sx),mh=Math.abs(marquee.ey-marquee.sy);
                return <div className="sel-box" style={{left:mx,top:my,width:mw,height:mh}}/>;
              })()}
            </>}
          </div>

          {/* Selection toolbar */}
          {selectedIds.size>0&&!marquee&&(()=>{
            // Position above the centroid of selected nodes
            const selNodes=ap?.nodes.filter(n=>selectedIds.has(n.id))||[];
            if(!selNodes.length)return null;
            const cvsR=cvs.current?.getBoundingClientRect()||{left:0,top:0};
            const avgX=selNodes.reduce((a,n)=>a+n.x+W/2,0)/selNodes.length;
            const minY=Math.min(...selNodes.map(n=>n.y));
            const tx=avgX*zoom+pan.x, ty=(minY-14)*zoom+pan.y-36;
            return (
              <div className="sel-toolbar" style={{left:tx,top:Math.max(8,ty),transform:'translateX(-50%)'}}>
                <span className="sel-count">{selectedIds.size}</span>
                <span className="sel-toolbar-title">个节点已选中</span>
                <button className="btn btn-run" style={{padding:'4px 12px',fontSize:11}}
                  onClick={()=>runSelected(selectedIds)} disabled={running}>
                  {running?<><div className="spin" style={{borderTopColor:'#fff',width:10,height:10}}/>运行中...</>:'▶ 运行选中'}
                </button>
                <button className="btn btn-g" style={{padding:'4px 8px',fontSize:11}}
                  onClick={()=>setSelectedIds(new Set())}>✕</button>
              </div>
            );
          })()}

          <div className="zoom-bar">
            <button className="zbtn" onClick={()=>setZoom(z=>Math.min(3,z*1.2))}>+</button>
            <span className="zlvl">{Math.round(zoom*100)}%</span>
            <button className="zbtn" onClick={()=>setZoom(z=>Math.max(.15,z/1.2))}>−</button>
            <button className="zbtn" title="重置视图" onClick={()=>{setZoom(1);setPan({x:60,y:60})}}>⊙</button>
          </div>

          <div className="minimap">
            <svg width="150" height="90" viewBox="0 0 4000 4000">
              {ap?.nodes.map(n=>(
                <rect key={n.id} x={n.x} y={n.y} width={W} height={140}
                  fill={`${C[n.type]}28`} stroke={C[n.type]} strokeWidth="12" rx="10"/>
              ))}
              {ap?.connections.map(c=>{
                const fn=ap.nodes.find(n=>n.id===c.from),tn=ap.nodes.find(n=>n.id===c.to);
                if(!fn||!tn)return null;
                const fp=portPos(fn,c.fromPort||'out'),tp=portPos(tn,c.toPort);
                return <line key={c.id} x1={fp.x} y1={fp.y} x2={tp.x} y2={tp.y}
                  stroke={C[fn.type]} strokeWidth="10" opacity=".6"/>;
              })}
            </svg>
          </div>

          {ap&&!ap.nodes.length&&(
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
              textAlign:'center',pointerEvents:'none'}}>
              <div style={{fontSize:44,marginBottom:10}}>🎨</div>
              <div style={{fontSize:15,color:'var(--t2)',marginBottom:4}}>画布为空</div>
              <div style={{fontSize:12,color:'var(--t3)'}}>从左侧拖拽节点开始构建工作流</div>
            </div>
          )}
        </div>
      </div>

      {/* Status bar */}
      <div className="sbar">
        <span><span className={`sdot ${status}`}/>{status==='running'?'执行中...':status==='done'?'完成':'就绪'}</span>
        <span>节点 {ap?.nodes.length||0}</span>
        <span>连线 {ap?.connections.length||0}</span>
        <span className="sbar-gal" onClick={()=>setShowGallery(true)}
          title="打开图库">
          🖼 {allGalleryImages.length} 张图
        </span>
        <span>{Math.round(zoom*100)}%</span>
        <span style={{marginLeft:'auto'}}>
  {selectedIds.size>0
    ?<span style={{color:'var(--cyan)',fontWeight:600}}>{selectedIds.size} 个节点已选中 — 点击工具栏「▶ 运行选中」</span>
    :<span>框选节点 · Alt+拖拽平移 · 滚轮缩放</span>}
</span>
      </div>

      {showNP&&(
        <div className="overlay" onClick={()=>setShowNP(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-ttl">📁 新建项目</div>
            <div className="flabel" style={{marginBottom:5}}>项目名称</div>
            <input className="finp" placeholder="我的工作流" value={npName}
              onChange={e=>setNPName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&mkProj()} autoFocus/>
            <div className="modal-acts">
              <button className="btn btn-g" onClick={()=>setShowNP(false)}>取消</button>
              <button className="btn btn-p" onClick={mkProj}>创建</button>
            </div>
          </div>
        </div>
      )}

      {/* ── API Key Config Modal ── */}
      {showApiCfg&&(
        <div className="overlay" onClick={e=>e.stopPropagation()}>
          <div className="modal" style={{width:440}}>
            <div style={{textAlign:'center',marginBottom:18}}>
              <div style={{fontSize:32,marginBottom:8}}>⚡</div>
              <div className="modal-ttl" style={{marginBottom:4}}>配置 API Key</div>
              <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.6}}>
                请输入您的 API Key 以使用生图功能。<br/>
                Key 仅保存在浏览器会话内存中，<strong>不会写入磁盘、不会上传、刷新页面后自动清除</strong>。
              </div>
            </div>
            <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:7,
              padding:'8px 12px',marginBottom:14,fontSize:11,color:'#0369a1',lineHeight:1.6}}>
              🔒 安全说明：API Key 通过 <code>sessionStorage</code> 存储，仅在当前标签页会话内有效，
              关闭标签页或刷新后自动销毁，源码中不含任何密钥。
            </div>
            <div className="flabel" style={{marginBottom:5}}>API Key</div>
            <input className="finp"
              type="password"
              placeholder="请粘贴您的 API Key..."
              value={apiKeyInput}
              onChange={e=>setApiKeyInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&saveApiKey()}
              autoFocus
              style={{marginBottom:6,fontFamily:'JetBrains Mono',letterSpacing:apiKeyInput?'0.08em':'normal'}}/>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:14}}>
              端点: {API_BASE} &nbsp;·&nbsp; 模型: {MODEL}
            </div>
            <div className="modal-acts">
              {sessionStorage.getItem("__cfapi")&&(
                <button className="btn btn-g" onClick={()=>setShowApiCfg(false)}>取消</button>
              )}
              <button className="btn btn-run" style={{flex:1,justifyContent:'center'}} onClick={saveApiKey}>
                ✓ 保存并开始使用
              </button>
            </div>
          </div>
        </div>
      )}

      <Toasts items={toasts}/>

      {/* ── Debug Panel ── */}
      {showDebug&&(
        <div className="debug-panel">
          <div className="debug-hdr">
            <span className="debug-title">🔍 API 响应调试</span>
            <button className="debug-btn" onClick={clearDebug}>清空</button>
            <button className="debug-btn" onClick={()=>{
              const txt=debugLog.join('\n');
              const a=document.createElement('a');
              a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
              a.download='debug_log.txt';a.click();
            }}>导出</button>
            <button className="debug-btn" onClick={()=>setShowDebug(false)}>✕</button>
          </div>
          <div className="debug-body">
            {debugLog.length===0
              ?<div style={{color:'#6b7280',textAlign:'center',paddingTop:20}}>
                运行工作流后，API响应详情将显示在这里
              </div>
              :debugLog.map((line,i)=>(
                <div key={i} className="debug-line"
                  style={{color:line.includes('✓')?'#86efac':line.includes('未能')||line.includes('error')?'#fca5a5':'#93c5fd'}}>
                  {line}
                </div>
              ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
